<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Admin Portal</title>

    <!-- Bootstrap CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <!-- JavaScript -->
    <script src="manage_users.js" defer></script>
</head>

<body class="bg-light">

    <!-- Header -->
    <header class="bg-dark text-white p-4 text-center">
        <h1>Admin Portal</h1>
    </header>

    <!-- Main content -->
    <main class="container my-5">

        <!-- Password Management Section -->
        <section class="card p-4 mb-5 shadow-sm">

            <h2 class="mb-4">Change Your Password</h2>

            <form action="#" id="password-form">

                <fieldset class="border p-3 rounded">

                    <legend class="float-none w-auto px-2">
                        Password Update
                    </legend>

                    <!-- Current Password -->
                    <label for="current-password" class="form-label">
                        Current Password
                    </label>

                    <input
                        type="password"
                        id="current-password"
                        class="form-control mb-3"
                        required
                    >

                    <!-- New Password -->
                    <label for="new-password" class="form-label">
                        New Password
                    </label>

                    <input
                        type="password"
                        id="new-password"
                        class="form-control mb-3"
                        minlength="8"
                        required
                    >

                    <!-- Confirm Password -->
                    <label for="confirm-password" class="form-label">
                        Confirm Password
                    </label>

                    <input
                        type="password"
                        id="confirm-password"
                        class="form-control mb-4"
                        required
                    >

                    <!-- Submit Button -->
                    <button
                        type="submit"
                        id="change"
                        class="btn btn-primary"
                    >
                        Update Password
                    </button>

                </fieldset>

            </form>

        </section>


        <!-- User Management Section -->
        <section class="card p-4 shadow-sm">

            <h2 class="mb-4">Manage Users</h2>

            <!-- Add User -->
            <details class="mb-4">

                <summary class="fw-bold mb-3">
                    Add New User
                </summary>

                <form action="#" id="add-user-form">

                    <fieldset class="border p-3 rounded">

                        <legend class="float-none w-auto px-2">
                            New User Information
                        </legend>

                        <!-- Full Name -->
                        <label for="user-name" class="form-label">
                            Full Name
                        </label>

                        <input
                            type="text"
                            id="user-name"
                            class="form-control mb-3"
                            required
                        >

                        <!-- Email -->
                        <label for="user-email" class="form-label">
                            Email
                        </label>

                        <input
                            type="email"
                            id="user-email"
                            class="form-control mb-3"
                            required
                        >

                        <!-- Default Password -->
                        <label for="default-password" class="form-label">
                            Default Password
                        </label>

                        <input
                            type="password"
                            id="default-password"
                            class="form-control mb-3"
                            minlength="8"
                            required
                        >

                        <!-- Admin Status -->
                        <label for="is-admin" class="form-label">
                            User Role
                        </label>

                        <select
                            id="is-admin"
                            class="form-select mb-4"
                        >
                            <option value="0">Student</option>
                            <option value="1">Admin</option>
                        </select>

                        <!-- Submit Button -->
                        <button
                            type="submit"
                            id="add"
                            class="btn btn-success"
                        >
                            Add User
                        </button>

                    </fieldset>

                </form>

            </details>


            <!-- User List -->
            <h3 class="mb-3">Registered Users</h3>

            <!-- Search -->
            <input
                type="text"
                id="search-input"
                class="form-control mb-4"
                placeholder="Search by name or email..."
            >

            <!-- User Table -->
            <div class="table-responsive">

                <table
                    id="user-table"
                    class="table table-bordered table-hover align-middle"
                >

                    <thead class="table-dark">

                        <tr>
                            <th scope="col">Name</th>
                            <th scope="col">Email</th>
                            <th scope="col">Admin</th>
                            <th scope="col">Actions</th>
                        </tr>

                    </thead>

                    <tbody id="user-table-body">
                        <!-- Dynamic rows added by manage_users.js -->
                    </tbody>

                </table>

            </div>

        </section>

    </main>

</body>
</html>
