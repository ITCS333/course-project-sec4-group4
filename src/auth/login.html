<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Login</title>

    <!-- Bootstrap CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

    <!-- Main content area -->
    <main>

        <!-- Login card -->
        <section class="card shadow p-4" style="width: 350px;">

            <!-- Form heading -->
            <h2 class="text-center mb-4">Welcome Back!</h2>

            <!-- Login form -->
            <form id="login-form" action="#">

                <!-- Grouped controls -->
                <fieldset>

                    <!-- Fieldset caption -->
                    <legend class="fs-5 mb-3">Secure Login</legend>

                    <!-- Email label -->
                    <label for="email" class="form-label">
                        Email Address
                    </label>

                    <!-- Email input -->
                    <input
                        type="email"
                        id="email"
                        class="form-control mb-3"
                        required
                    >

                    <!-- Password label -->
                    <label for="password" class="form-label">
                        Password
                    </label>

                    <!-- Password input -->
                    <input
                        type="password"
                        id="password"
                        class="form-control mb-4"
                        minlength="8"
                        required
                    >

                    <!-- Submit button -->
                    <button
                        type="submit"
                        id="login"
                        class="btn btn-primary w-100"
                    >
                        Log In
                    </button>

                </fieldset>

                <!-- Message container -->
                <div id="message-container" class="mt-3"></div>

            </form>

        </section>

    </main>

    <!-- JavaScript -->
    <script src="login.js" defer></script>

</body>
</html>
